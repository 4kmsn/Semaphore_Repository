---
- name: Iniciar la VM Arch_Linux desde Windows
  hosts: windows_host
  gather_facts: false

  tasks:
    - name: Arrancar la VM Arch_Linux
      raw: '"C:\Program Files\Oracle\VirtualBox\VBoxManage.exe" startvm "Arch_Linux" --type headless'

- name: Actualizar Arch Linux y apagarla
  hosts: linux_servers
  gather_facts: false

  tasks:
    - name: Esperar a que SSH esté disponible
      wait_for_connection:
        timeout: 300
        sleep: 5

    - name: Actualizar Arch
      shell: pacman -Syu --noconfirm

    - name: Apagar Arch
      shell: shutdown now
      async: 1
      poll: 0
