---
- name: Iniciar la VM Arch_Linux desde Windows
  hosts: windows-host
  gather_facts: false

  tasks:
    - name: Arrancar la VM Arch_Linux
      ansible.builtin.shell: >
        "C:\Program Files\Oracle\VirtualBox\VBoxManage.exe"
        startvm "Arch_Linux" --type headless
      changed_when: true

- name: Actualizar Arch Linux y apagarla
  hosts: linux-servers
  gather_facts: false

  tasks:
    - name: Esperar a que SSH esté disponible
      wait_for_connection:
        timeout: 300
        sleep: 5

    - name: Actualizar el sistema
      ansible.builtin.shell: pacman -Syu --noconfirm
      become: true

    - name: Apagar la máquina
      ansible.builtin.shell: shutdown now
      become: true
      async: 1
      poll: 0
